<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- CSS: -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- PESTANIA: -->
    <title>Parcial</title>

</head>



<body class="bg-slate-900 text-gray-50">

    <header class="bg-slate-700 grid grid-cols-7 items-center p-2">

    <!-- logo -->
        <div class="
                lg:size-15
                md:size-15
                sm:size-15
                size-10">
            <a href="index.html">
                <img
                src="../img/logo.webp"
                alt="logo de la pagina">
            </a>
        </div>

    <!-- navbar -->
        <div class="col-span-4 col-start-3">
            <input
            type="text"
            class="bg-slate-500 p-2 w-full"
            id="buscador"
            placeholder="Buscar...">
        </div>

    <!-- carrito de compras y perfil -->
        <div class="flex justify-self-end col-start-8">
            <a href="#">
                <img
                src="../img/carrito.webp"
                alt="logo carrito de compras"
                class="
                    lg:size-15 lg:mx-5
                    md:size-15
                    sm:size-15
                    size-10">
            </a>

            <a
            id="icono-perfil"
            href="#">
                <img
                src="../img/user-icon.webp"
                alt="icono de usuario"
                class="
                    lg:size-15
                    md:size-15
                    sm:size-15
                    size-10">
            </a>
        </div>

    </header>

    <main>
        <h1 class="text-center pt-10 text-4xl">Titulo de la pagina</h1>
    </main>

</body>
</html>
